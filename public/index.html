<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Cannappy — Apps that solve real problems</title>
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- Primary Meta Tags -->
    <meta name="title" content="Cannappy" />
    <meta
      name="description"
      content="A small studio building focused apps that solve real, everyday problems — for travelers, growers, creators, and everyone the big apps overlook."
    />
    <meta name="author" content="Cannappy LLC" />
    <!-- Theme Colour -->
    <meta name="theme-color" content="#0d0f0e" />
    <script>
      (() => {
        const theme = localStorage.getItem("theme") === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "dark" ? "#0d0f0e" : "#f7f6f2");
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/normalize.css" />
    <link rel="stylesheet" href="/dist/index.css" />
  </head>
  <body>
    <div id="root">Loading...</div>
    <script
      type="module"
      src="/dist/index.js"
      nonce="MTMxMDA2MzQ3MSwzMDg2OTI4MTQ0"
    ></script>
  </body>
</html>
